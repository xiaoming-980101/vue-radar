name: Deploy JD Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows:
      - Update GitHub Trending
    types:
      - completed

concurrency:
  group: deploy-jd-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      JD_HOST: ${{ secrets.JD_HOST || '111.228.44.255' }}
      JD_PORT: ${{ secrets.JD_PORT || '22' }}
      JD_USER: ${{ secrets.JD_USER || 'root' }}
      JD_DEPLOY_PATH: ${{ secrets.JD_DEPLOY_PATH || '/var/www/vue-radar' }}
      JD_PUBLIC_URL: ${{ secrets.JD_PUBLIC_URL || 'http://111.228.44.255:7870' }}
      JD_HOST_FINGERPRINT: ${{ secrets.JD_HOST_FINGERPRINT || 'SHA256:uy22N6dK/kgwYyN4wenTv2duN19qgsdADQpXDHaNzmg' }}
      SSHPASS: ${{ secrets.JD_SSH_PASSWORD || secrets.JD_PASSWORD || secrets.SERVER_PASSWORD }}

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist to JD Cloud
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SSHPASS:-}" ]; then
            echo "::warning::JD_SSH_PASSWORD is not configured. Build succeeded, deploy skipped."
            touch .deploy-skipped
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y sshpass

          mkdir -p ~/.ssh
          ssh-keyscan -p "$JD_PORT" "$JD_HOST" > ~/.ssh/known_hosts.new
          if [ -n "$JD_HOST_FINGERPRINT" ]; then
            if ! ssh-keygen -lf ~/.ssh/known_hosts.new -E sha256 | awk '{print $2}' | grep -Fx "$JD_HOST_FINGERPRINT"; then
              echo "::error::JD Cloud host key fingerprint mismatch."
              ssh-keygen -lf ~/.ssh/known_hosts.new -E sha256 || true
              exit 1
            fi
          fi
          mv ~/.ssh/known_hosts.new ~/.ssh/known_hosts

          archive="vue-radar-dist-${GITHUB_SHA}.tgz"
          tar -C dist -czf "$archive" .

          sshpass -e scp -P "$JD_PORT" -o StrictHostKeyChecking=yes "$archive" "$JD_USER@$JD_HOST:/tmp/$archive"

          sshpass -e ssh -p "$JD_PORT" -o StrictHostKeyChecking=yes "$JD_USER@$JD_HOST" \
            "DEPLOY_SHA='$GITHUB_SHA' DEPLOY_TARGET='$JD_DEPLOY_PATH' DEPLOY_ARCHIVE='/tmp/$archive' bash -s" <<'REMOTE'
          set -euo pipefail

          target="$DEPLOY_TARGET"
          archive="$DEPLOY_ARCHIVE"
          release="/tmp/vue-radar-release-$DEPLOY_SHA"
          backup="/var/backups/vue-radar-$(date +%Y%m%d%H%M%S)"

          test "$target" = "/var/www/vue-radar"
          test -f "$archive"

          rm -rf "$release"
          mkdir -p "$release" /var/backups "$target"
          tar -xzf "$archive" -C "$release"

          test -f "$release/index.html"
          test -f "$release/codex-uses.html"

          cp -a "$target" "$backup"
          find "$target" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
          cp -a "$release"/. "$target"/

          nginx -t
          nginx -s reload

          rm -rf "$release" "$archive"
          echo "Deployed $DEPLOY_SHA to $target"
          echo "Backup: $backup"
          REMOTE

      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          if [ -f .deploy-skipped ]; then
            echo "Deploy was skipped because JD_SSH_PASSWORD is not configured."
            exit 0
          fi
          curl -fsS "$JD_PUBLIC_URL/index.html?sha=${GITHUB_SHA}" | grep -q '<div id="app"></div>'
          curl -fsS "$JD_PUBLIC_URL/codex-uses.html?sha=${GITHUB_SHA}" | grep -q 'Codex 趣味用法'
